<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 신청</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:         #FEFCE8;       /* 연한 크림 노랑 배경 */
    --card:       #FFFFFF;
    --yellow:     #FDE047;       /* 파스텔 노랑 */
    --yellow-soft:#FEF9C3;
    --yellow-dark:#854D0E;
    --sky:        #BAE6FD;       /* 연한 하늘색 포인트 */
    --sky-soft:   #F0F9FF;
    --sky-mid:    #38BDF8;       /* 버튼·강조용 하늘색 */
    --sky-dark:   #0369A1;
    --text-main:  #292524;
    --text-muted: #78716C;
    --text-light: #A8A29E;
    --border:     #E7E5E4;
    --border-light:#F5F5F4;
    --shadow:     rgba(120,113,108,0.12);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--bg);
    font-family:'Noto Sans KR', sans-serif;
    color:var(--text-main);
    font-size:14px;
    line-height:1.6;
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    padding:30px 20px 48px;
  }

  /* ===== 헤더 ===== */
  header{ margin-bottom:22px; }
  .eyebrow{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    color:var(--sky-dark);
    background:var(--sky);
    padding:2px 10px;
    border-radius:20px;
    letter-spacing:0.8px;
    margin-bottom:10px;
  }
  h1{
    font-size:21px;
    font-weight:700;
    letter-spacing:-0.3px;
    margin-bottom:5px;
    line-height:1.35;
  }
  .sub{
    font-size:13px;
    color:var(--text-muted);
  }

  /* ===== 달력 ===== */
  .calendar{
    background:var(--card);
    border-radius:16px;
    padding:18px 16px;
    box-shadow: 0 4px 12px var(--shadow), 0 1px 3px var(--shadow);
    margin-bottom:4px;
  }
  .cal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .month-label{
    font-size:15px;
    font-weight:700;
    color:var(--text-main);
  }
  .cal-nav{
    width:30px; height:30px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--bg);
    color:var(--text-muted);
    font-size:15px;
    cursor:pointer;
    transition:background .12s, color .12s;
  }
  .cal-nav:hover{ background:var(--yellow-soft); color:var(--yellow-dark); border-color:var(--yellow); }
  .cal-nav:active{ background:var(--yellow); }

  .cal-weekdays, .cal-grid{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    text-align:center;
  }
  .cal-weekdays div{
    font-size:11px;
    font-weight:600;
    color:var(--text-light);
    padding-bottom:8px;
  }
  .cal-grid{ row-gap:2px; }
  .cal-grid div.cell{
    display:flex;
    align-items:center;
    justify-content:center;
    height:36px;
  }
  .day-btn{
    width:32px; height:32px;
    border-radius:8px;
    border:none;
    background:transparent;
    font-family:'Noto Sans KR', sans-serif;
    font-size:13px;
    font-weight:400;
    color:var(--text-main);
    cursor:pointer;
    transition:background .1s, color .1s;
  }
  .day-btn.selectable:hover{
    background:var(--yellow-soft);
    color:var(--yellow-dark);
  }
  .day-btn.today{
    font-weight:700;
    color:var(--sky-dark);
    background:var(--sky);
  }
  .day-btn.selected{
    background:var(--yellow);
    color:var(--yellow-dark);
    font-weight:700;
  }
  .day-btn.disabled{
    color:var(--text-light);
    cursor:not-allowed;
  }

  /* ===== 시간 선택 ===== */
  .section-header{
    display:flex;
    align-items:center;
    gap:8px;
    margin:20px 0 10px;
  }
  .section-title{
    font-size:13px;
    font-weight:700;
    color:var(--text-main);
  }
  .section-sub{
    font-size:12px;
    color:var(--text-muted);
  }

  .time-grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:8px;
  }
  .time-chip{
    padding:11px 0;
    text-align:center;
    border-radius:10px;
    font-size:13px;
    font-weight:500;
    font-family:'Noto Sans KR', sans-serif;
    border:1.5px solid var(--sky);
    background:var(--sky-soft);
    color:var(--sky-dark);
    cursor:pointer;
    transition:background .1s, border-color .1s, transform .1s;
  }
  .time-chip:hover{
    background:var(--sky);
    transform:translateY(-1px);
    box-shadow:0 3px 8px var(--shadow);
  }
  .time-chip:active{ transform:translateY(0); }
  .time-chip.disabled{
    background:var(--border-light);
    color:var(--text-light);
    border-color:var(--border);
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
    text-decoration:line-through;
  }

  .empty-msg{
    font-size:13px;
    color:var(--text-muted);
    padding:24px 0;
    text-align:center;
    grid-column: 1 / -1;
  }

  /* ===== 바텀 시트 ===== */
  .overlay{
    position:fixed; inset:0;
    background:rgba(41,37,36,0.4);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:10;
  }
  .overlay.open{ display:flex; }
  .sheet{
    width:100%;
    max-width:480px;
    background:var(--card);
    border-radius:20px 20px 0 0;
    padding:24px 20px 36px;
    box-shadow:0 -6px 24px rgba(120,113,108,0.16);
    animation:slideUp .22s ease;
  }
  @keyframes slideUp{
    from{ transform:translateY(100%); }
    to{ transform:translateY(0); }
  }
  .sheet-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom:14px;
    padding-bottom:14px;
    border-bottom:1.5px solid var(--border-light);
  }
  .sheet h2{
    font-size:16px;
    font-weight:700;
    margin-bottom:3px;
  }
  .picked{
    font-size:13px;
    font-weight:600;
    color:var(--pink-mid);
  }
  .notice{
    font-size:12px;
    color:var(--text-muted);
    background:var(--yellow-soft);
    border-left:3px solid var(--yellow);
    padding:8px 12px;
    border-radius:0 6px 6px 0;
    margin-bottom:16px;
    line-height:1.6;
  }
  label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--text-muted);
    letter-spacing:0.2px;
    margin:14px 0 5px;
  }
  input, textarea{
    width:100%;
    padding:10px 13px;
    border:1.5px solid var(--border);
    border-radius:10px;
    background:var(--card);
    font-family:'Noto Sans KR', sans-serif;
    font-size:14px;
    color:var(--text-main);
    transition:border-color .12s, box-shadow .12s;
  }
  input:focus, textarea:focus{
    outline:none;
    border-color:var(--pink-mid);
    box-shadow:0 0 0 3px var(--pink);
  }
  textarea{ min-height:72px; resize:vertical; }

  .btn-row{
    display:flex;
    gap:8px;
    margin-top:20px;
  }
  .btn-cancel, .btn-submit{
    flex:1;
    padding:13px 0;
    border-radius:12px;
    font-family:'Noto Sans KR', sans-serif;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    border:none;
    transition:background .12s, transform .1s;
  }
  .btn-cancel{
    background:var(--border-light);
    color:var(--text-muted);
    border:1.5px solid var(--border);
  }
  .btn-cancel:hover{ background:var(--border); }
  .btn-submit{
    background:var(--pink-mid);
    color:#fff;
    box-shadow:0 3px 10px rgba(236,72,153,0.3);
  }
  .btn-submit:hover{ background:var(--pink-dark); transform:translateY(-1px); }
  .btn-submit:active{ transform:translateY(0); }
  .btn-submit:disabled{ opacity:0.55; cursor:not-allowed; transform:none; }

  /* ===== 토스트 ===== */
  .toast{
    position:fixed;
    bottom:24px; left:50%;
    transform:translateX(-50%) translateY(12px);
    background:var(--text-main);
    color:#fff;
    padding:10px 20px;
    border-radius:20px;
    font-size:13px;
    font-weight:500;
    opacity:0;
    transition:all .22s ease;
    z-index:20;
    white-space:nowrap;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">상담 신청</div>
    <h1>염승희 선생님과<br>상담 시간 잡기</h1>
    <p class="sub">평일 08:00 ~ 16:00 사이, 비어있는 시간을 골라 신청하세요.</p>
  </header>

  <div class="calendar">
    <div class="cal-header">
      <button class="cal-nav" id="prevMonth">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="cal-nav" id="nextMonth">›</button>
    </div>
    <div class="cal-weekdays">
      <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="section-header">
    <span class="section-title" id="timeLabel">🕐 시간 선택</span>
    <span class="section-sub" id="timeSub">날짜를 먼저 선택하세요</span>
  </div>
  <div id="timeGrid" class="time-grid"></div>
</div>

<div id="overlay" class="overlay">
  <div class="sheet">
    <div class="sheet-top">
      <div>
        <h2>상담 신청서 작성</h2>
        <div class="picked" id="pickedInfo"></div>
      </div>
    </div>
    <p class="notice">실명으로 작성해 주세요. 허위 작성이나 부적절한 내용은 확인 후 별도 안내될 수 있습니다.</p>

    <label for="studentId">학번</label>
    <input id="studentId" type="text" inputmode="numeric" placeholder="예: 20413">

    <label for="studentName">이름</label>
    <input id="studentName" type="text" placeholder="예: 김민지">

    <label for="purpose">상담 목적</label>
    <textarea id="purpose" placeholder="어떤 이야기를 나누고 싶은지 간단히 적어주세요."></textarea>

    <div class="btn-row">
      <button class="btn-cancel" id="cancelBtn">취소</button>
      <button class="btn-submit" id="submitBtn">신청하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ⚠️ Apps Script 배포 후 발급된 웹앱 URL을 여기에 붙여넣으세요.
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzaSJApCT9-I9Xkm3wOei_tGSxuBYbuczVxK-B0IdiE8mHvX_zS1EggbL5lJ0TBgRqRfQ/exec';

  let viewYear, viewMonth;
  let selectedDate = null;
  let selectedTime = null;
  let currentSlots = [];

  const today = new Date();
  today.setHours(0,0,0,0);
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();

  const monthLabelEl = document.getElementById('monthLabel');
  const calGridEl    = document.getElementById('calGrid');
  const timeGridEl   = document.getElementById('timeGrid');
  const timeLabelEl  = document.getElementById('timeLabel');
  const timeSubEl    = document.getElementById('timeSub');
  const overlayEl    = document.getElementById('overlay');
  const pickedInfoEl = document.getElementById('pickedInfo');
  const toastEl      = document.getElementById('toast');

  function pad(n){ return n < 10 ? '0' + n : '' + n; }
  function toDateStr(y, m, d){ return y + '-' + pad(m+1) + '-' + pad(d); }

  function renderCalendar(){
    monthLabelEl.textContent = viewYear + '년 ' + (viewMonth + 1) + '월';
    calGridEl.innerHTML = '';

    const firstDow    = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    for(let i = 0; i < firstDow; i++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      calGridEl.appendChild(cell);
    }

    for(let d = 1; d <= daysInMonth; d++){
      const cell      = document.createElement('div');
      cell.className  = 'cell';
      const dateObj   = new Date(viewYear, viewMonth, d);
      const dow       = dateObj.getDay();
      const dateStr   = toDateStr(viewYear, viewMonth, d);
      const isPast    = dateObj < today;
      const isWeekend = dow === 0 || dow === 6;
      const isToday   = dateObj.getTime() === today.getTime();
      const isSelected = dateStr === selectedDate;
      const disabled  = isPast || isWeekend;

      const btn = document.createElement('button');
      btn.textContent = d;
      btn.className = 'day-btn' +
        (disabled            ? ' disabled'  : ' selectable') +
        (isToday && !disabled ? ' today'    : '') +
        (isSelected          ? ' selected'  : '');

      if(!disabled){ btn.onclick = () => selectDate(dateStr); }
      else          { btn.disabled = true; }

      cell.appendChild(btn);
      calGridEl.appendChild(cell);
    }
  }

  document.getElementById('prevMonth').onclick = () => {
    viewMonth--;
    if(viewMonth < 0){ viewMonth = 11; viewYear--; }
    renderCalendar();
  };
  document.getElementById('nextMonth').onclick = () => {
    viewMonth++;
    if(viewMonth > 11){ viewMonth = 0; viewYear++; }
    renderCalendar();
  };

  async function selectDate(dateStr){
    selectedDate = dateStr;
    renderCalendar();

    const d = new Date(dateStr + 'T00:00:00');
    const dowNames = ['일','월','화','수','목','금','토'];
    timeSubEl.textContent = (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + dowNames[d.getDay()] + ')';
    timeGridEl.innerHTML = '<div class="empty-msg">불러오는 중...</div>';

    try{
      const res  = await fetch(APPS_SCRIPT_URL + '?action=getSlots&date=' + dateStr);
      const data = await res.json();
      currentSlots = data.slots || [];
      renderTimeGrid();
    }catch(err){
      timeGridEl.innerHTML = '<div class="empty-msg">시간을 불러오지 못했어요. 잠시 후 다시 시도해주세요.</div>';
    }
  }

  function renderTimeGrid(){
    timeGridEl.innerHTML = '';
    if(!currentSlots.length){
      timeGridEl.innerHTML = '<div class="empty-msg">신청 가능한 시간이 없어요.</div>';
      return;
    }
    currentSlots.forEach(slot => {
      const btn = document.createElement('button');
      btn.className = 'time-chip' + (slot.available ? '' : ' disabled');
      btn.textContent = slot.time;
      if(slot.available){ btn.onclick = () => openSheet(slot.time); }
      else               { btn.disabled = true; }
      timeGridEl.appendChild(btn);
    });
  }

  function openSheet(time){
    selectedTime = time;
    const d = new Date(selectedDate + 'T00:00:00');
    const dowNames = ['일','월','화','수','목','금','토'];
    pickedInfoEl.textContent =
      (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + dowNames[d.getDay()] + ')  ' + time;
    document.getElementById('studentId').value   = '';
    document.getElementById('studentName').value = '';
    document.getElementById('purpose').value     = '';
    overlayEl.classList.add('open');
  }

  document.getElementById('cancelBtn').onclick = () => overlayEl.classList.remove('open');
  overlayEl.onclick = (e) => { if(e.target === overlayEl) overlayEl.classList.remove('open'); };

  document.getElementById('submitBtn').onclick = async () => {
    const studentId = document.getElementById('studentId').value.trim();
    const name      = document.getElementById('studentName').value.trim();
    const purpose   = document.getElementById('purpose').value.trim();

    if(!studentId || !name || !purpose){
      showToast('모든 항목을 입력해주세요 😊');
      return;
    }

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled    = true;
    submitBtn.textContent = '신청 중...';

    try{
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers:{ 'Content-Type':'text/plain;charset=utf-8' },
        body: JSON.stringify({ studentId, name, date:selectedDate, time:selectedTime, purpose })
      });
      const result = await res.json();

      if(result.success){
        overlayEl.classList.remove('open');
        showToast('신청이 완료되었어요! 🎉');
        selectDate(selectedDate);
      }else{
        showToast(result.message || '신청에 실패했어요. 다시 시도해주세요.');
      }
    }catch(err){
      showToast('네트워크 오류가 발생했어요.');
    }finally{
      submitBtn.disabled    = false;
      submitBtn.textContent = '신청하기';
    }
  };

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2400);
  }

  renderCalendar();
</script>
</body>
</html>
